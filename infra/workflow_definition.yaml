main:
    params: [args]
    steps:
    - init:
        assign:
            - repository: "projects/${project_id}/locations/${region}/repositories/${repo_name}"
    - createCompilation:
        call: http.post
        args:
            url: $${"https://dataform.googleapis.com/v1beta1/" + repository + "/compilationResults"}
            auth: {type: OAuth2}
            body:
                gitCommitish: "main"
                codeCompilationConfig:
                    defaultDatabase: "${project_id}"
                    vars:
                        flavor: "${flavor}"
                        raw_ga4: "${raw_ga4}"
                        raw_ads: "${raw_ads}"
                        raw_ads_table: "${raw_ads_table}"
                        silver_schema: "${silver_dataset}"
                        gold_schema: "${gold_dataset}"
                        tab_slv_ga4: "${tab_slv_ga4}"
                        tab_slv_ads: "${tab_slv_ads}"
                        tab_gld_mkt: "${tab_gld_mkt}"
                        tab_gld_retail: "${tab_gld_retail}"
        result: compilation
    - execute:
        call: http.post
        args:
            url: $${"https://dataform.googleapis.com/v1beta1/" + repository + "/workflowInvocations"}
            auth: {type: OAuth2}
            body:
                compilationResult: $${compilation.body.name}
        result: invocation
    - complete:
        return: $${invocation.body.name}